<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JCLA — Jonathan Conway Literary Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --ink: #1a1814;
  --paper: #f7f4ee;
  --cream: #ede9e0;
  --warm-mid: #c8bfaa;
  --warm-light: #e8e2d4;
  --accent: #b85c38;
  --accent-light: #e8d5cc;
  --blue: #2d5a8e;
  --blue-light: #dce8f5;
  --green: #3a7a52;
  --green-light: #d5ead9;
  --amber: #c49a2a;
  --amber-light: #f5ead1;
  --grey: #8a8278;
  --grey-light: #eae6de;
  --red: #c0392b;
  --font-serif: 'Libre Baskerville', Georgia, serif;
  --font-mono: 'DM Mono', monospace;
  --font-sans: 'DM Sans', sans-serif;
  --radius: 4px;
  --shadow: 0 1px 3px rgba(26,24,20,0.12);
  --shadow-lg: 0 4px 16px rgba(26,24,20,0.16);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: var(--ink);
  color: var(--paper);
  padding: 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.site-logo {
  font-family: var(--font-serif);
  font-size: 17px;
  letter-spacing: 0.04em;
  font-style: italic;
}
.site-logo span {
  font-style: normal;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.6;
  margin-left: 8px;
}
.header-date {
  font-family: var(--font-mono);
  font-size: 12px;
  opacity: 0.55;
  letter-spacing: 0.04em;
}

/* ── TABS ── */
.tab-bar {
  background: var(--ink);
  display: flex;
  padding: 0 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  gap: 4px;
}
.tab-btn {
  background: none;
  border: none;
  color: rgba(247,244,238,0.45);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.tab-btn:hover { color: rgba(247,244,238,0.75); }
.tab-btn.active {
  color: var(--paper);
  border-bottom-color: var(--accent);
}

/* ── MAIN LAYOUT ── */
.tab-panel { display: none; padding: 16px; max-width: 800px; margin: 0 auto; }
.tab-panel.active { display: block; }

/* ── CARDS / BLOCKS ── */
.block-card {
  background: white;
  border: 1px solid var(--warm-light);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: box-shadow 0.15s;
}
.block-card:hover { box-shadow: var(--shadow-lg); }
.block-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  cursor: pointer;
  user-select: none;
  border-left: 3px solid transparent;
}
.block-header.type-deep { border-left-color: var(--blue); background: var(--blue-light); }
.block-header.type-reactive { border-left-color: var(--green); background: var(--green-light); }
.block-header.type-planning { border-left-color: var(--amber); background: var(--amber-light); }
.block-header.type-break { border-left-color: var(--grey); background: var(--grey-light); }
.block-header.type-fixed { border-left-color: var(--accent); background: var(--accent-light); }
.block-header.type-capture { border-left-color: var(--grey); background: var(--grey-light); }

.block-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--grey);
  min-width: 80px;
  letter-spacing: 0.04em;
}
.block-name {
  font-weight: 500;
  font-size: 14px;
  flex: 1;
}
.block-badges {
  display: flex;
  gap: 5px;
  align-items: center;
}
.badge {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 20px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.badge-now { background: var(--accent); color: white; }
.badge-open { background: var(--amber); color: white; }
.badge-done { background: var(--grey); color: white; opacity: 0.6; }
.badge-fixed { background: var(--blue); color: white; }
.block-chevron {
  font-size: 12px;
  opacity: 0.4;
  transition: transform 0.2s;
}
.block-card.expanded .block-chevron { transform: rotate(180deg); }

.block-body {
  display: none;
  padding: 8px 14px 12px 14px;
  border-top: 1px solid var(--warm-light);
}
.block-card.expanded .block-body { display: block; }

/* ── TASKS ── */
.task-list { list-style: none; }
.task-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid var(--cream);
}
.task-item:last-child { border-bottom: none; }
.task-cb {
  width: 17px;
  height: 17px;
  min-width: 17px;
  border: 1.5px solid var(--warm-mid);
  border-radius: 3px;
  cursor: pointer;
  margin-top: 2px;
  appearance: none;
  background: white;
  transition: all 0.15s;
  position: relative;
}
.task-cb:checked {
  background: var(--green);
  border-color: var(--green);
}
.task-cb:checked::after {
  content: '✓';
  position: absolute;
  top: -1px;
  left: 2px;
  font-size: 12px;
  color: white;
}
.task-text {
  flex: 1;
  font-size: 14px;
  line-height: 1.4;
}
.task-item.completed .task-text {
  text-decoration: line-through;
  opacity: 0.45;
}
.task-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--grey);
  background: var(--grey-light);
  padding: 1px 6px;
  border-radius: 10px;
  white-space: nowrap;
}
.task-carried {
  font-size: 11px;
  color: var(--amber);
  font-family: var(--font-mono);
}
.task-delete {
  background: none;
  border: none;
  color: var(--warm-mid);
  cursor: pointer;
  font-size: 14px;
  padding: 0 2px;
  line-height: 1;
  transition: color 0.15s;
}
.task-delete:hover { color: var(--red); }

.add-task-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.add-task-input {
  flex: 1;
  font-family: var(--font-sans);
  font-size: 13px;
  border: 1px solid var(--warm-light);
  border-radius: var(--radius);
  padding: 6px 10px;
  background: var(--paper);
  color: var(--ink);
  outline: none;
}
.add-task-input:focus { border-color: var(--blue); }
.btn {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-primary { background: var(--ink); color: var(--paper); }
.btn-primary:hover { background: #333; }
.btn-secondary { background: white; color: var(--ink); border-color: var(--warm-light); }
.btn-secondary:hover { border-color: var(--warm-mid); }
.btn-accent { background: var(--accent); color: white; }
.btn-accent:hover { background: #a04e2e; }
.btn-sm { padding: 4px 9px; font-size: 10px; }

/* ── KARMA PANEL ── */
.karma-panel {
  background: white;
  border: 1px solid var(--warm-light);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.karma-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.karma-title {
  font-family: var(--font-serif);
  font-size: 13px;
  font-style: italic;
  color: var(--grey);
}
.karma-score {
  font-family: var(--font-mono);
  font-size: 24px;
  font-weight: 500;
  color: var(--ink);
}
.karma-score span { font-size: 12px; color: var(--grey); }
.karma-stars { font-size: 18px; letter-spacing: 2px; }
.karma-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.karma-tag-chip {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--cream);
  color: var(--grey);
}

/* ── INBOX ── */
.inbox-panel {
  background: white;
  border: 1px solid var(--warm-light);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.inbox-title {
  font-family: var(--font-serif);
  font-size: 13px;
  font-style: italic;
  color: var(--grey);
  margin-bottom: 10px;
}
.inbox-input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}
.inbox-items {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.inbox-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  background: var(--cream);
  border-radius: var(--radius);
  font-size: 13px;
}
.inbox-item .task-tag { margin-left: auto; }
.inbox-schedule-btn {
  background: none;
  border: 1px solid var(--warm-mid);
  border-radius: var(--radius);
  font-size: 10px;
  font-family: var(--font-mono);
  padding: 2px 8px;
  cursor: pointer;
  color: var(--grey);
  white-space: nowrap;
  transition: all 0.15s;
}
.inbox-schedule-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }

/* ── SHUTDOWN NOTE ── */
.shutdown-area {
  background: white;
  border: 1px solid var(--warm-light);
  border-radius: var(--radius);
  padding: 14px;
  margin-top: 12px;
  box-shadow: var(--shadow);
}
.shutdown-title {
  font-family: var(--font-serif);
  font-size: 13px;
  font-style: italic;
  color: var(--grey);
  margin-bottom: 8px;
}
.shutdown-textarea {
  width: 100%;
  min-height: 80px;
  font-family: var(--font-sans);
  font-size: 14px;
  border: 1px solid var(--warm-light);
  border-radius: var(--radius);
  padding: 8px 10px;
  background: var(--paper);
  color: var(--ink);
  resize: vertical;
  outline: none;
  line-height: 1.5;
}
.shutdown-textarea:focus { border-color: var(--blue); }

/* ── PROJECTS TAB ── */
.projects-summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.summary-chip {
  background: white;
  border: 1px solid var(--warm-light);
  border-radius: var(--radius);
  padding: 10px;
  text-align: center;
  box-shadow: var(--shadow);
}
.summary-chip .num {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 500;
  display: block;
}
.summary-chip .lbl {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-family: var(--font-mono);
  color: var(--grey);
}
.filter-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.filter-btn {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--warm-light);
  background: white;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--grey);
}
.filter-btn:hover, .filter-btn.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.project-card {
  background: white;
  border: 1px solid var(--warm-light);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: box-shadow 0.15s;
}
.project-card:hover { box-shadow: var(--shadow-lg); }
.project-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 14px;
  cursor: pointer;
  border-left: 3px solid transparent;
}
.priority-high { border-left-color: var(--accent); }
.priority-medium { border-left-color: var(--amber); }
.priority-low { border-left-color: var(--grey); }
.project-title-block { flex: 1; }
.project-title { font-weight: 500; font-size: 15px; margin-bottom: 2px; }
.project-author { font-size: 12px; color: var(--grey); font-style: italic; font-family: var(--font-serif); }
.project-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.stage-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--cream);
  color: var(--grey);
  letter-spacing: 0.04em;
}
.ball-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  border: 1px solid var(--warm-mid);
  color: var(--ink);
  white-space: nowrap;
}
.ball-jonathan { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
.project-body {
  display: none;
  padding: 12px 14px;
  border-top: 1px solid var(--cream);
  background: var(--paper);
}
.project-card.expanded .project-body { display: block; }
.project-card.expanded .block-chevron { transform: rotate(180deg); }

.project-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}
.project-field label {
  display: block;
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--grey);
  margin-bottom: 3px;
}
.project-field input,
.project-field select,
.project-field textarea {
  width: 100%;
  font-family: var(--font-sans);
  font-size: 13px;
  border: 1px solid var(--warm-light);
  border-radius: var(--radius);
  padding: 5px 8px;
  background: white;
  color: var(--ink);
  outline: none;
}
.project-field input:focus,
.project-field select:focus,
.project-field textarea:focus { border-color: var(--blue); }
.project-field.full { grid-column: 1 / -1; }
.project-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* ── REVIEW TAB ── */
.review-section {
  background: white;
  border: 1px solid var(--warm-light);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.review-section-header {
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  border-left: 3px solid var(--accent);
}
.review-section-title {
  font-family: var(--font-serif);
  font-size: 16px;
  font-style: italic;
}
.review-progress-bar {
  height: 3px;
  background: var(--cream);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 14px;
}
.review-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s;
}
.review-item {
  display: flex;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--cream);
}
.review-item:last-child { border-bottom: none; }
.review-item-content { flex: 1; }
.review-item-text { font-size: 14px; margin-bottom: 4px; }
.review-note-input {
  width: 100%;
  font-family: var(--font-sans);
  font-size: 12px;
  border: 1px solid var(--warm-light);
  border-radius: var(--radius);
  padding: 5px 8px;
  background: var(--paper);
  color: var(--grey);
  outline: none;
  resize: vertical;
  min-height: 40px;
  margin-top: 4px;
  display: none;
}
.review-note-input.open { display: block; }
.review-note-toggle {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--grey);
  cursor: pointer;
  text-decoration: underline;
}
.accomplishments-section {
  background: white;
  border: 1px solid var(--warm-light);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.accomplishments-title {
  font-family: var(--font-serif);
  font-size: 16px;
  font-style: italic;
  margin-bottom: 12px;
}
.day-group {
  margin-bottom: 14px;
}
.day-group-title {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--grey);
  margin-bottom: 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--cream);
}
.completed-task-item {
  font-size: 13px;
  padding: 3px 0;
  display: flex;
  align-items: center;
  gap: 6px;
}
.completed-task-item::before {
  content: '✓';
  color: var(--green);
  font-size: 11px;
}

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,24,20,0.5);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white;
  border-radius: var(--radius);
  padding: 20px;
  max-width: 420px;
  width: 100%;
  box-shadow: var(--shadow-lg);
}
.modal-title {
  font-family: var(--font-serif);
  font-size: 18px;
  font-style: italic;
  margin-bottom: 14px;
}
.modal-field { margin-bottom: 12px; }
.modal-field label {
  display: block;
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--grey);
  margin-bottom: 4px;
}
.modal-field select,
.modal-field input,
.modal-field textarea {
  width: 100%;
  font-family: var(--font-sans);
  font-size: 14px;
  border: 1px solid var(--warm-light);
  border-radius: var(--radius);
  padding: 7px 10px;
  background: var(--paper);
  color: var(--ink);
  outline: none;
}
.modal-field select:focus,
.modal-field input:focus,
.modal-field textarea:focus { border-color: var(--blue); }
.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 16px;
}

/* ── SECTION HEADER ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.section-title {
  font-family: var(--font-serif);
  font-size: 18px;
  font-style: italic;
}
.section-sub {
  font-size: 12px;
  color: var(--grey);
  margin-top: 2px;
}

/* ── LOGIN SCREEN ── */
.login-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--ink);
  z-index: 999;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
}
.login-card {
  background: var(--paper);
  border-radius: 6px;
  padding: 36px 40px;
  text-align: center;
  max-width: 340px;
  width: 90%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
}
.login-logo {
  font-family: var(--font-serif);
  font-size: 22px;
  font-style: italic;
  margin-bottom: 4px;
}
.login-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--grey);
  margin-bottom: 28px;
}
.btn-google {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 11px 20px;
  background: white;
  border: 1.5px solid var(--warm-mid);
  border-radius: var(--radius);
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--ink);
}
.btn-google:hover { border-color: var(--ink); box-shadow: var(--shadow); }
.btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
.login-error {
  font-size: 12px;
  color: var(--red);
  margin-top: 10px;
  min-height: 18px;
}
.sign-out-btn {
  display: none;
  background: none;
  border: none;

// FIREBASE HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function loadDayData() {
  const ref = doc(db, 'days', todayKey);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    dayData = { ...dayData, ...snap.data() };
    // Ensure blocks array is present
    if (!dayData.blocks || dayData.blocks.length === 0) {
      dayData.blocks = initBlocks();
    }
  } else {
    dayData.blocks = initBlocks();
    await saveDayData();
  }
  renderToday();
}

async function saveDayData() {
  const ref = doc(db, 'days', todayKey);
  await setDoc(ref, dayData, { merge: true });
}

async function loadProjects() {
  const snap = await getDoc(doc(db, 'meta', 'projects'));
  if (snap.exists() && snap.data().list) {
    projects = snap.data().list;
  } else {
    // Seed
    projects = SEED_PROJECTS.map((p, i) => ({ ...p, id: 'p' + i }));
    await saveProjects();
  }
  renderProjects();
}

async function saveProjects() {
  await setDoc(doc(db, 'meta', 'projects'), { list: projects });
}

async function loadReviewData() {
  const weekKey = getWeekKey();
  const snap = await getDoc(doc(db, 'reviews', weekKey));
  if (snap.exists()) reviewData = { ...reviewData, ...snap.data() };
  renderReview();
}

async function saveReviewData() {
  const weekKey = getWeekKey();
  await setDoc(doc(db, 'reviews', weekKey), reviewData, { merge: true });
}

function getWeekKey() {
  const d = new Date(today);
  d.setDate(d.getDate() - d.getDay() + 1); // Monday
  return d.toISOString().slice(0, 10);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// BLOCK HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initBlocks() {
  return getDayTemplate(dayNum).map(tpl => ({
    ...tpl,
    tasks: tpl.fixed ? [{ id: uid(), text: tpl.name, done: false, fixed: true }] : [],
  }));
}

function uid() {
  return Math.random().toString(36).slice(2, 9);
}

function getCurrentBlockId() {
  const h = today.getHours();
  const m = today.getMinutes();
  const now = h * 60 + m;
  // Simple time-based heuristic
  const timeMap = {
    'capture': [0, 540],
    'setup': [540, 560],
    'deep': [560, 720],
    'email1': [720, 765],
    'lunch': [765, 810],
    'action': [810, 900],
    'email2': [900, 930],
    'planning': [930, 975],
    'shutdown': [975, 990],
    'btc': [480, 720],
    'weekly': [690, 720],
    'pickup': [945, 975],
    'personal': [0, 720],
    'rest': [0, 1440],
  };
  for (const [id, [s, e]] of Object.entries(timeMap)) {
    if (now >= s && now < e) return id;
  }
  return null;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// KARMA
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function calcKarma() {
  let pts = 0;
  const tagCounts = {};
  for (const block of dayData.blocks) {
    for (const task of (block.tasks || [])) {
      if (!task.done) continue;
      let p = 1;
      if (block.type === 'deep') p = 3;
      else if (block.fixed) p = 2;
      pts += p;
      const tag = extractTag(task.text);
      if (tag) tagCounts[tag] = (tagCounts[tag] || 0) + p;
    }
  }
  if (dayData.shutdownSaved) pts += 1;
  return { pts, tagCounts };
}

function extractTag(text) {
  const m = text.match(/#(\w[\w\s]*?)(?:\s|$)/);
  return m ? m[1].trim() : null;
}

function starsForPoints(pts) {
  if (pts >= 20) return '★★★★★';
  if (pts >= 14) return '★★★★☆';
  if (pts >= 9) return '★★★☆☆';
  if (pts >= 5) return '★★☆☆☆';
  if (pts >= 1) return '★☆☆☆☆';
  return '☆☆☆☆☆';
}

function updateKarma() {
  const { pts, tagCounts } = calcKarma();
  document.getElementById('karmaScore').textContent = pts;
  document.getElementById('karmaStars').textContent = starsForPoints(pts);
  const tagEl = document.getElementById('karmaTags');
  tagEl.innerHTML = Object.entries(tagCounts).map(([tag, p]) =>
    `<span class="karma-tag-chip">#${tag} · ${p}pts</span>`
  ).join('');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RENDER TODAY
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderToday() {
  document.getElementById('todayTitle').textContent = dayName;
  document.getElementById('todaySub').textContent = today.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('shutdownNote').value = dayData.shutdownNote || '';

  const container = document.getElementById('blocksContainer');
  container.innerHTML = '';
  const currentId = getCurrentBlockId();

  for (const block of (dayData.blocks || [])) {
    const isNow = block.id === currentId;
    const tasks = block.tasks || [];
    const hasPending = tasks.some(t => !t.done && !block.fixed);
    const isPast = isBlockPast(block);
    const isOpen = isPast && hasPending;

    const card = document.createElement('div');
    card.className = 'block-card';
    card.id = 'block-' + block.id;

    let badges = '';
    if (isNow) badges += '<span class="badge badge-now">NOW</span>';
    if (isOpen && !isNow) badges += '<span class="badge badge-open">Open</span>';
    if (block.fixed) badges += '<span class="badge badge-fixed">Fixed</span>';
    const doneCount = tasks.filter(t => t.done).length;
    if (doneCount > 0) badges += `<span class="badge badge-done">${doneCount}/${tasks.length}</span>`;

    card.innerHTML = `
      <div class="block-header type-${block.type}" onclick="toggleBlock('${block.id}')">
        <span class="block-time">${block.time}</span>
        <span class="block-name">${block.name}</span>
        <div class="block-badges">${badges}</div>
        <span class="block-chevron">▼</span>
      </div>
      <div class="block-body">
        <ul class="task-list" id="tasks-${block.id}"></ul>
        ${!block.fixed ? `
        <div class="add-task-row">
          <input class="add-task-input" id="input-${block.id}" type="text" placeholder="Add task… (#tag)" onkeydown="if(event.key==='Enter')addTask('${block.id}')">
          <button class="btn btn-secondary btn-sm" onclick="addTask('${block.id}')">+ Add</button>
        </div>` : ''}
      </div>`;

    container.appendChild(card);
    renderTasks(block.id);
    if (isNow) card.classList.add('expanded');
  }
  updateKarma();
}

function renderTasks(blockId) {
  const block = dayData.blocks.find(b => b.id === blockId);
  if (!block) return;
  const ul = document.getElementById('tasks-' + blockId);
  if (!ul) return;
  ul.innerHTML = '';
  for (const task of (block.tasks || [])) {
    const li = document.createElement('li');
    li.className = 'task-item' + (task.done ? ' completed' : '');
    const tag = extractTag(task.text);
    const cleanText = task.text.replace(/#[\w\s]+/, '').trim();
    li.innerHTML = `
      <input type="checkbox" class="task-cb" ${task.done ? 'checked' : ''} onchange="toggleTask('${blockId}','${task.id}',this.checked)">
      <span class="task-text">${cleanText}</span>
      ${tag ? `<span class="task-tag">#${tag}</span>` : ''}
      ${task.carried ? '<span class="task-carried">↩ carried</span>' : ''}
      ${!task.fixed ? `<button class="task-delete" onclick="deleteTask('${blockId}','${task.id}')">×</button>` : ''}
    `;
    ul.appendChild(li);
  }
}

function isBlockPast(block) {
  if (!block.time || block.time.includes('Pre-work') || block.time.includes('All')) return false;
  const match = block.time.match(/(\d+):(\d+)–/);
  if (!match) return false;
  const blockEnd = parseInt(match[1]) * 60 + parseInt(match[2]);
  const now = today.getHours() * 60 + today.getMinutes();
  return now > blockEnd;
}

// TASK ACTIONS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
window.toggleBlock = function(blockId) {
  const card = document.getElementById('block-' + blockId);
  card.classList.toggle('expanded');
};

window.toggleTask = async function(blockId, taskId, done) {
  const block = dayData.blocks.find(b => b.id === blockId);
  const task = block.tasks.find(t => t.id === taskId);
  task.done = done;
  if (done) {
    // Archive
    if (!dayData.completedTasks) dayData.completedTasks = [];
    dayData.completedTasks.push({ text: task.text, block: block.name, date: todayKey, tag: extractTag(task.text) });
    dayData.completedTasks = dayData.completedTasks.slice(-500);
  }
  await saveDayData();
  renderTasks(blockId);
  updateKarma();
};

window.addTask = async function(blockId) {
  const input = document.getElementById('input-' + blockId);
  const text = input.value.trim();
  if (!text) return;
  const block = dayData.blocks.find(b => b.id === blockId);
  block.tasks.push({ id: uid(), text, done: false, fixed: false, carried: false });
  input.value = '';
  await saveDayData();
  renderTasks(blockId);
};

window.deleteTask = async function(blockId, taskId) {
  const block = dayData.blocks.find(b => b.id === blockId);
  block.tasks = block.tasks.filter(t => t.id !== taskId);
  await saveDayData();
  renderTasks(blockId);
};

window.saveShutdown = async function() {
  dayData.shutdownNote = document.getElementById('shutdownNote').value;
  dayData.shutdownSaved = true;
  await saveDayData();
  updateKarma();
};

window.deleteInboxItem = async function(itemId) {

window.openScheduleModal = function(itemId) {

    .filter(b => !b.fixed)

    .join('');

};

window.confirmSchedule = async function() {
  const blockId = document.getElementById('scheduleBlockSelect').value;

  closeModal('scheduleModal');

          <span class="ball-badge ${ballClass}">⚽ ${proj.ball}</span>

      </div>
      <div class="project-body">
        <div class="project-grid">

          <div class="project-field"><label>US Publisher / Co-agent</label><div style="font-size:13px;padding:5px 0;">${proj.usPublisher||'—'}</div></div>
          <div class="project-field full"><label>Next action</label><div style="font-size:14px;padding:5px 0;font-weight:500;">${proj.nextAction||'—'}</div></div>

  }
}

// REVIEW
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderReview() {
  const weekStart = new Date(today);
  weekStart.setDate(weekStart.getDate() - weekStart.getDay() + 1);
  document.getElementById('reviewWeekLabel').textContent = 'Week of ' + weekStart.toLocaleDateString('en-GB', { day: 'numeric', month: 'long' });

  const container = document.getElementById('reviewContainer');
  container.innerHTML = '';

  let totalItems = 0, doneItems = 0;

  for (const [sectionKey, section] of Object.entries(REVIEW_CHECKLIST)) {
    const sectionData = reviewData.items || {};
    const sDiv = document.createElement('div');
    sDiv.className = 'review-section';

    const itemsHTML = section.items.map((text, i) => {
      const key = `${sectionKey}_${i}`;
      const checked = sectionData[key + '_done'] || false;
      const note = sectionData[key + '_note'] || '';
      totalItems++;
      if (checked) doneItems++;
      return `
        <div class="review-item">
          <input type="checkbox" class="task-cb" ${checked ? 'checked' : ''} onchange="toggleReviewItem('${key}',this.checked)">
          <div class="review-item-content">
            <div class="review-item-text">${text}</div>
            <span class="review-note-toggle" onclick="toggleReviewNote('${key}')">+ note</span>
            <textarea class="review-note-input ${note ? 'open' : ''}" id="rnote-${key}" placeholder="Add a note…" onblur="saveReviewNote('${key}',this.value)">${note}</textarea>
          </div>
        </div>`;
    }).join('');

    sDiv.innerHTML = `
      <div class="review-section-header" onclick="this.parentElement.querySelector('.block-body').classList.toggle('open-body')">
        <div class="review-section-title">${section.title}</div>
        <span class="block-chevron">▼</span>
      </div>
      <div>${itemsHTML}</div>`;
    container.appendChild(sDiv);
  }

  const pct = totalItems ? Math.round((doneItems / totalItems) * 100) : 0;
  document.getElementById('reviewProgressFill').style.width = pct + '%';

  renderAccomplishments();
}

window.toggleReviewItem = async function(key, val) {
  if (!reviewData.items) reviewData.items = {};
  reviewData.items[key + '_done'] = val;
  await saveReviewData();
  renderReview();
};

window.toggleReviewNote = function(key) {
  const el = document.getElementById('rnote-' + key);
  el.classList.toggle('open');
  if (el.classList.contains('open')) el.focus();
};

window.saveReviewNote = async function(key, val) {
  if (!reviewData.items) reviewData.items = {};
  reviewData.items[key + '_note'] = val;
  await saveReviewData();
};

async function renderAccomplishments() {
  const container = document.getElementById('accomplishmentsContainer');
  // Load this week's days
  const weekStart = new Date(today);
  weekStart.setDate(weekStart.getDate() - weekStart.getDay() + 1);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    days.push(d.toISOString().slice(0, 10));
  }

  let html = '';
  let totalPts = 0;
  for (const dayKey of days) {
    const snap = await getDoc(doc(db, 'days', dayKey));
    if (!snap.exists()) continue;
    const data = snap.data();
    const completed = (data.completedTasks || []);
    if (!completed.length) continue;
    const dName = new Date(dayKey).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short' });
    html += `<div class="day-group">
      <div class="day-group-title">${dName}</div>
      ${completed.map(t => `<div class="completed-task-item"><span class="task-text" style="font-size:13px;">${t.text.replace(/#[\w\s]+/,'').trim()}</span>${t.tag ? `<span class="task-tag">#${t.tag}</span>` : ''}</div>`).join('')}
    </div>`;
  }
  container.innerHTML = html || '<div class="empty-state">Complete tasks this week to see them here</div>';
}

window.closeModal = function(id) {
  document.getElementById(id).classList.remove('open');
};
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TAB SWITCHING
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
window.switchTab = function(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
  // Also handle when called programmatically
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.textContent.toLowerCase() === tab || b.getAttribute('onclick').includes("'"+tab+"'")) {
      b.classList.add('active');
    }
  });
};

getRedirectResult(auth).then(result => {

}).catch(e => {

window.signOutUser = async function() {
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  const loginScreen = document.getElementById('loginScreen');
  const appShell = document.getElementById('appShell');
  const signOutBtn = document.getElementById('signOutBtn');

  if (user && (ALLOWED_UID === 'PASTE_YOUR_UID_HERE' || user.uid === ALLOWED_UID)) {
    // Authorised
    loginScreen.style.display = 'none';
    appShell.style.display = 'block';
    signOutBtn.style.display = 'inline-block';
    if (ALLOWED_UID === 'PASTE_YOUR_UID_HERE') {
      console.warn('⚠️ Copy your UID into ALLOWED_UID to lock the app to your account:', user.uid);
    }
    loadDayData();
    loadProjects();
    loadReviewData();
  } else if (user && user.uid !== ALLOWED_UID) {
    // Wrong account
    loginScreen.style.display = 'flex';
    appShell.style.display = 'none';
    document.getElementById('loginError').textContent = 'Access denied. This dashboard is private.';
    signOut(auth);
  } else {
    // Not signed in
    loginScreen.style.display = 'flex';
    appShell.style.display = 'none';
    signOutBtn.style.display = 'none';
  }
});
